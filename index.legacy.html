async function sha256(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

const api = {
  async login(username, password) {
    const hash = await sha256(password);
    const { data } = await sb.from('users')
      .select('id, username, role')
      .eq('username', username).eq('password_hash', hash).maybeSingle();
    return data || null;
  },
  async listUsers() {
    const { data } = await sb.from('users').select('id, username, role, created_at').order('created_at');
    return data || [];
  },
  async addUser(username, password, role) {
    const hash = await sha256(password);
    const { data, error } = await sb.from('users')
      .insert({ username, password_hash: hash, role }).select().single();
    if (error) throw error;
    return data;
  },
  async deleteUser(id) {
    const { error } = await sb.from('users').delete().eq('id', id);
    if (error) throw error;
  },
  async listNotes() {
    const { data } = await sb.from('owner_notes').select('bean_id, note');
    const obj = {};
    (data || []).forEach(r => { obj[r.bean_id] = r.note; });
    return obj;
  },
  async upsertNote(beanId, note) {
    const { error } = await sb.from('owner_notes')
      .upsert({ bean_id: beanId, note, updated_at: new Date().toISOString() });
    if (error) throw error;
  },
  async getGreeting() {
    const { data } = await sb.from('greeting').select('content').eq('id', 1).maybeSingle();
    return data?.content || '';
  },
  async setGreeting(content) {
    const { error } = await sb.from('greeting')
      .upsert({ id: 1, content, updated_at: new Date().toISOString() });
    if (error) throw error;
  },
  async listOrders() {
    const { data } = await sb.from('orders')
      .select('*').order('at', { ascending: false }).limit(100);
    return (data || []).map(r => ({
      at: new Date(r.at).getTime(),
      items: r.items_json,
      total: r.total,
      takeout: r.takeout,
    }));
  },
  async createOrder(order) {
    const { error } = await sb.from('orders').insert({
      at: new Date(order.at).toISOString(),
      items_json: order.items,
      total: order.total,
      takeout: order.takeout,
    });
    if (error) throw error;
  },
};

function saveSession(s) {
  if (s) sessionStorage.setItem(SESSION_KEY, JSON.stringify(s));

function sameOptions(a, b) { return a.iced === b.iced && a.roast === b.roast && a.subtype === b.subtype; }
function optionLabel(o) {

function CartPanel({ cart, setCart, takeout, setTakeout, onCheckout }) {
  const subtotal = cart.reduce((s, it) => s + (it.basePrice + (it.options.iced?500:0)) * it.qty, 0);
  const eligibleCount = takeout ? cart.filter(it => !/리필|디저트|치즈케이크|토스트|주스/.test(it.name)).reduce((s,it)=>s+it.qty,0) : 0;
  const discount = takeout ? 1000 * eligibleCount : 0;
  const total = Math.max(0, subtotal - discount);

  const dec = (i) => setCart(cart.map((it,idx) => idx===i ? {...it, qty: Math.max(1, it.qty-1)} : it));
  const inc = (i) => setCart(cart.map((it,idx) => idx===i ? {...it, qty: it.qty+1} : it));
  const rm  = (i) => setCart(cart.filter((_,idx)=>idx!==i));

  return (
    <aside className="soft-card p-5 lg:sticky lg:top-4 h-fit">
      <div className="flex items-center justify-between mb-3">
        <div>
          <div className="font-display tracking-[0.25em] text-xs text-gold uppercase">Your Order</div>
          <div className="font-display text-2xl">주문 내역</div>
        </div>
        <div className="chip chip-strong">{cart.reduce((s,i)=>s+i.qty,0)} 잔</div>
      </div>

      <div className="space-y-3 max-h-[50vh] overflow-y-auto pr-1 scroll-hide">
        {cart.length === 0 && <div className="text-sm ink-soft text-center py-8">담긴 메뉴가 없습니다.<br/>원하는 원두를 탭해 주세요.</div>}
        {cart.map((it, i) => {
          const unit = it.basePrice + (it.options.iced?500:0);
          return (
            <div key={i} className="pb-3 border-b hairline">
              <div className="flex justify-between items-start gap-2">
                <div className="flex-1">
                  <div className="font-medium text-sm">{it.name}</div>
                  <div className="text-[11px] ink-soft">{optionLabel(it.options) || '옵션 없음'}</div>
                </div>
                <button onClick={()=>rm(i)} className="text-xs ink-soft">✕</button>
              </div>
              <div className="flex justify-between items-center mt-2">
                <div className="flex items-center gap-2">
                  <button onClick={()=>dec(i)} className="w-7 h-7 rounded-full border hairline">−</button>
                  <span className="w-6 text-center text-sm">{it.qty}</span>
                  <button onClick={()=>inc(i)} className="w-7 h-7 rounded-full border hairline">+</button>
                </div>
                <div className="font-display text-lg">{KRW(unit * it.qty)}</div>
              </div>
            </div>
          );
        })}
      </div>

      <div className="mt-4">
        <label className="flex items-center gap-2 text-sm">
          <input type="checkbox" checked={takeout} onChange={e=>setTakeout(e.target.checked)} />
          테이크 아웃 (음료당 1,000원 할인 · 디저트/리필 제외)
        </label>
      </div>

      <div className="mt-4 space-y-1 text-sm">
        <div className="flex justify-between"><span className="ink-soft">소계</span><span>{KRW(subtotal)}</span></div>
        {takeout && <div className="flex justify-between text-gold"><span>테이크아웃 할인</span><span>- {KRW(discount)}</span></div>}
      </div>
      <div className="mt-2 flex justify-between items-baseline">
        <span className="font-display text-sm ink-soft">TOTAL</span>
        <span className="font-display text-3xl">{KRW(total)}</span>
      </div>
      <button disabled={cart.length===0} onClick={onCheckout} className={`btn w-full justify-center mt-4 ${cart.length? 'btn-primary':'btn-outline opacity-60 cursor-not-allowed'}`}>주문 접수하기</button>
    </aside>
  );
}

    <div className="min-h-screen flex items-center justify-center px-5">
      <form onSubmit={submit} className="soft-card p-8 w-full max-w-sm card-shadow">
        <div className="font-stair text-2xl">STAiR</div>
        <div className="text-[10px] tracking-[0.3em] text-gold mt-1">스테어 커피 · 매장 로그인</div>
        <div className="font-display text-2xl mt-6 mb-5">로그인</div>
        <div className="space-y-3">
          <input
            value={username} onChange={e=>setUsername(e.target.value)}
            placeholder="아이디" autoComplete="username"
            className="w-full border hairline rounded-lg px-3 py-2.5 bg-paper text-sm"
          />
          <input
            type="password" value={password} onChange={e=>setPassword(e.target.value)}
            placeholder="비밀번호" autoComplete="current-password"
            className="w-full border hairline rounded-lg px-3 py-2.5 bg-paper text-sm"
          />
          {error && <div className="text-xs" style={{color:'var(--rose)'}}>{error}</div>}
          <button type="submit" disabled={loading}
            className={`btn btn-primary w-full justify-center ${loading?'opacity-60':''}`}>
            {loading ? '확인 중...' : '로그인'}
          </button>
        </div>
        <div className="text-[11px] ink-soft mt-6 text-center">

}

function AdminView({ state, setState, session, onLogout }) {
  const [newUser, setNewUser] = useState({ username: '', password: '', role: 'staff' });
  const [userError, setUserError] = useState(null);

  const updateNote = async (id, text) => {
    setState(s => ({ ...s, notes: { ...s.notes, [id]: text } }));
    try { await api.upsertNote(id, text); } catch (e) { alert('저장 실패: ' + e.message); }
  };
  const updateGreeting = async (text) => {
    setState(s => ({ ...s, greeting: text }));
    try { await api.setGreeting(text); } catch (e) { alert('저장 실패: ' + e.message); }
  };

  const addUser = async () => {
    setUserError(null);
    const u = newUser.username.trim();
    const p = newUser.password;
    if (!u || !p) { setUserError('아이디와 비밀번호를 입력하세요.'); return; }
    try {
      const created = await api.addUser(u, p, newUser.role);
      setState(s => ({ ...s, users: [...s.users, created] }));
      setNewUser({ username: '', password: '', role: 'staff' });
    } catch (e) {
      setUserError(e.code === '23505' ? '이미 존재하는 아이디입니다.' : ('추가 실패: ' + e.message));
    }
  };

  const deleteUser = async (u) => {
    if (u.username === session.username) { alert('현재 로그인된 계정은 삭제할 수 없습니다.'); return; }
    if (!confirm(`${u.username} 계정을 삭제할까요?`)) return;
    try {
      await api.deleteUser(u.id);
      setState(s => ({ ...s, users: s.users.filter(x => x.id !== u.id) }));
    } catch (e) { alert('삭제 실패: ' + e.message); }
  };

  const exportJson = () => {
    const payload = {
      notes: state.notes, greeting: state.greeting, orders: state.orders,
      users: state.users.map(u => ({ username: u.username, role: u.role, created_at: u.created_at })),
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'stair_admin_export.json'; a.click();
    URL.revokeObjectURL(url);
  };

  if (session.role !== 'admin') {
    return (
      <div className="max-w-md mx-auto mt-10 soft-card p-8 text-center">
        <div className="font-display tracking-[0.25em] text-xs text-gold uppercase">Admin</div>
        <div className="font-display text-2xl mt-1">관리자 권한 필요</div>
        <p className="text-sm ink-soft mt-3">현재 로그인된 <b>{session.username}</b> 계정은 관리자 권한이 없습니다.</p>
        <button onClick={onLogout} className="btn btn-outline mt-5">다른 계정으로 로그인</button>
      </div>
    );
  }

  return (
    <div className="space-y-8">
      <div className="soft-card p-6">
        <div className="flex justify-between items-start gap-3 flex-wrap">
          <div>
            <div className="font-display tracking-[0.25em] text-xs text-gold uppercase">Users</div>
            <div className="font-display text-2xl mt-1">사용자 관리</div>
          </div>
          <button onClick={exportJson} className="btn btn-outline">내보내기 (JSON)</button>
        </div>

        <div className="mt-5 space-y-2">
          {state.users.length === 0 && <div className="text-sm ink-soft">사용자가 없습니다.</div>}
          {state.users.map(u => (
            <div key={u.id} className="flex items-center justify-between border hairline rounded-md p-3 bg-paper gap-3 flex-wrap">
              <div>
                <div className="font-medium">{u.username} {u.username === session.username && <span className="chip ml-1">나</span>}</div>
                <div className="text-xs ink-soft mt-0.5">{u.role === 'admin' ? '관리자' : '직원'} · {new Date(u.created_at).toLocaleDateString('ko-KR')}</div>
              </div>
              <button onClick={() => deleteUser(u)} className="btn btn-outline text-sm">삭제</button>
            </div>
          ))}
        </div>

        <div className="mt-5 border-t hairline pt-5">
          <div className="text-sm font-medium mb-3">새 사용자 추가</div>
          <div className="flex flex-wrap gap-2">
            <input
              value={newUser.username} onChange={e=>setNewUser({...newUser, username:e.target.value})}
              placeholder="아이디" className="border hairline rounded-md px-3 py-2 bg-paper text-sm flex-1 min-w-[140px]"
            />
            <input
              type="password" value={newUser.password} onChange={e=>setNewUser({...newUser, password:e.target.value})}
              placeholder="비밀번호" className="border hairline rounded-md px-3 py-2 bg-paper text-sm flex-1 min-w-[140px]"
            />
            <select value={newUser.role} onChange={e=>setNewUser({...newUser, role:e.target.value})}
              className="border hairline rounded-md px-3 py-2 bg-paper text-sm">
              <option value="staff">직원</option>
              <option value="admin">관리자</option>
            </select>
            <button onClick={addUser} className="btn btn-primary">+ 추가</button>
          </div>
          {userError && <div className="text-xs mt-2" style={{color:'var(--rose)'}}>{userError}</div>}
        </div>
      </div>

      <div className="soft-card p-6">
        <div className="font-display tracking-[0.25em] text-xs text-gold uppercase">Greeting</div>
        <div className="font-display text-2xl mt-1 mb-2">사장님의 한마디 (메인 페이지)</div>
        <textarea value={state.greeting} onChange={e=>updateGreeting(e.target.value)}
          className="w-full border hairline rounded-md p-3 bg-paper text-sm leading-relaxed" rows={4}/>
      </div>

      <div className="soft-card p-6">
        <div className="font-display tracking-[0.25em] text-xs text-gold uppercase">Per-Item Notes</div>
        <div className="font-display text-2xl mt-1 mb-4">원두별 사장님 한마디</div>

        <div className="space-y-3">
          {[...CATALOG.brewing, ...CATALOG.decaf, ...CATALOG.blended].map(b => (
            <div key={b.id} className="border hairline rounded-md p-3 bg-paper">
              <div className="flex justify-between items-start gap-3 flex-wrap">
                <div className="flex-1 min-w-[200px]">
                  <div className="font-medium">{b.name}</div>
                  <div className="text-xs ink-soft">{b.origin} · {b.process}</div>
                </div>
                <div className="text-xs ink-soft">{KRW(b.price)}</div>
              </div>
              <textarea value={state.notes[b.id] || ''} onChange={e=>updateNote(b.id, e.target.value)}
                className="w-full mt-2 border hairline rounded-md p-2 bg-paper-2 text-sm" rows={2}
                placeholder="사장님 한마디를 입력하세요" />
            </div>
          ))}
        </div>
      </div>

      <div className="soft-card p-6">
        <div className="font-display tracking-[0.25em] text-xs text-gold uppercase">Orders</div>
        <div className="font-display text-2xl mt-1 mb-3">최근 주문</div>
        {state.orders.length === 0 && <div className="text-sm ink-soft">아직 주문이 없습니다.</div>}
        <div className="space-y-3">
          {state.orders.slice(0,30).map((o,i)=>(
            <div key={i} className="border hairline rounded-md p-3 text-sm bg-paper">
              <div className="flex justify-between">
                <div className="ink-soft text-xs">{new Date(o.at).toLocaleString('ko-KR')}</div>
                <div className="font-display text-lg">{KRW(o.total)}</div>
              </div>
              <ul className="mt-2 text-sm list-disc pl-5">
                {(o.items || []).map((it,j)=><li key={j}>{it.name} × {it.qty} <span className="ink-soft text-xs">{optionLabel(it.options)}</span></li>)}
              </ul>
              {o.takeout && <div className="text-xs text-gold mt-1">테이크아웃</div>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [session, setSession] = useState(loadSession);
  const [tab, setTab] = useState('menu');
  const [state, setState] = useState({ notes: {}, greeting: '', orders: [], users: [], loaded: false });
  const [activeBean, setActiveBean] = useState(null);
  const [cart, setCart] = useState([]);
  const [takeout, setTakeout] = useState(false);
  const [toast, setToast] = useState(null);

  useEffect(() => {
    if (!session) return;
    let cancelled = false;
    (async () => {
      try {
        const [notes, greeting, orders, users] = await Promise.all([
          api.listNotes(),
          api.getGreeting(),
          api.listOrders(),
          session.role === 'admin' ? api.listUsers() : Promise.resolve([]),
        ]);
        if (!cancelled) setState({ notes, greeting, orders, users, loaded: true });
      } catch (e) {
        console.error('데이터 로딩 실패', e);
        if (!cancelled) setState(s => ({ ...s, loaded: true }));
      }
    })();
    return () => { cancelled = true; };
  }, [session?.id]);

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(null), 1600); };

  const addToCart = (entry) => {
    const opts = { ...DEFAULT_OPTIONS, ...entry.options };
    const idx = cart.findIndex(c => c.id === entry.id && sameOptions(c.options, opts));
    if (idx >= 0) {
      const next = [...cart]; next[idx] = { ...next[idx], qty: next[idx].qty + 1 }; setCart(next);
    } else {
      setCart([...cart, { ...entry, options: opts, qty: 1 }]);
    }
    setActiveBean(null);
    showToast(`담김: ${entry.name}`);
  };

  const checkout = async () => {
    const subtotal = cart.reduce((s, it) => s + (it.basePrice + (it.options.iced?500:0)) * it.qty, 0);
    const eligible = cart.filter(it => !/리필|디저트|치즈케이크|토스트|주스/.test(it.name)).reduce((s,it)=>s+it.qty,0);
    const discount = takeout ? 1000 * eligible : 0;
    const total = Math.max(0, subtotal - discount);
    const order = { at: Date.now(), items: cart, total, takeout };
    try {
      await api.createOrder(order);
      setState(s => ({ ...s, orders: [order, ...s.orders] }));
      setCart([]); setTakeout(false);
      alert(`주문이 접수되었습니다.\n총 금액: ${KRW(total)}\n카운터에서 호출까지 잠시만 기다려 주세요 :)`);
    } catch (e) {
      alert('주문 접수 실패: ' + e.message);
    }
  };

  const handleLogin = (user) => { saveSession(user); setSession(user); };
  const handleLogout = () => { saveSession(null); setSession(null); setTab('menu'); };

  if (!session) return <LoginView onLogin={handleLogin} />;

  const navTabs = [['menu','메뉴 · 주문'], ['guide','사용 안내']];
  if (session.role === 'admin') navTabs.push(['admin','관리자']);

  return (
    <div className="min-h-screen">
      <header className="sticky top-0 z-30 bg-paper/90 backdrop-blur border-b hairline">
        <div className="max-w-[1400px] mx-auto px-5 md:px-8 py-4 flex items-center justify-between gap-4 flex-wrap">
          <div>
            <div className="font-stair text-2xl">STAiR</div>
            <div className="text-[10px] tracking-[0.3em] text-gold">스테어 커피 · SIPHON CAFE</div>
          </div>
          <div className="flex items-center gap-3 flex-wrap">
            <nav className="flex gap-2 flex-wrap">
              {navTabs.map(([k,label]) => (
                <button key={k} onClick={()=>setTab(k)} className={`btn ${tab===k?'btn-primary':'btn-outline'}`}>{label}</button>
              ))}
            </nav>
            <div className="flex items-center gap-2 pl-3 border-l hairline">
              <span className="text-xs ink-soft">{session.username} {session.role === 'admin' && <span className="chip ml-1">관리자</span>}</span>
              <button onClick={handleLogout} className="btn btn-outline text-sm">로그아웃</button>
            </div>
          </div>
        </div>
      </header>

      <main className="max-w-[1400px] mx-auto px-5 md:px-8 py-6 md:py-10">
        {!state.loaded ? (
          <div className="text-center py-20 ink-soft">데이터를 불러오는 중...</div>
        ) : tab === 'menu' ? (
          <div className="grid lg:grid-cols-[1fr_360px] gap-8">
            <div>
              <MenuView
                notes={state.notes}
                greeting={state.greeting}
                onAdd={addToCart}
                setActiveBean={setActiveBean}
              />
            </div>
            <CartPanel cart={cart} setCart={setCart} takeout={takeout} setTakeout={setTakeout} onCheckout={checkout} />
          </div>
        ) : tab === 'guide' ? (
          <GuideView />
        ) : tab === 'admin' ? (
          <AdminView state={state} setState={setState} session={session} onLogout={handleLogout} />
        ) : null}
      </main>

      {activeBean && <BeanModal bean={activeBean} ownerNote={state.notes[activeBean.id]} onClose={()=>setActiveBean(null)} onAdd={addToCart} />}

      {toast && (
        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 btn-primary btn shadow-lg">
          {toast}
        </div>
      )}

      <footer className="text-center text-xs ink-soft py-10">
        STAiR 스테어 커피 · @stair_2025 · 사이폰 전문 · Powered by Supabase
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
