function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return { notes: {...defaultOwnerNotes}, greeting: defaultGreeting, orders: [] };
    const p = JSON.parse(raw);
    return {
      notes: { ...defaultOwnerNotes, ...(p.notes || {}) },
      greeting: p.greeting || defaultGreeting,
      orders: p.orders || [],
    };
  } catch(e) {
    return { notes: {...defaultOwnerNotes}, greeting: defaultGreeting, orders: [] };
  }
}
function saveState(s) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch(e){}
}

const DEFAULT_OPTIONS = { iced: false, roast: null, subtype: null };
function sameOptions(a, b) { return a.iced === b.iced && a.roast === b.roast && a.subtype === b.subtype; }
function optionLabel(o) {
  const bits = [];
  if (o.roast) bits.push(o.roast);
  if (o.subtype) bits.push(o.subtype);

  return bits.join(' · ');
}

function CartPanel({ cart, setCart, takeout, setTakeout, onCheckout }) {
  const subtotal = cart.reduce((s, it) => s + (it.basePrice + (it.options.iced?500:0)) * it.qty, 0);
  const eligibleCount = takeout ? cart.filter(it => !/리필|디저트|치즈케이크|토스트|주스/.test(it.name)).reduce((s,it)=>s+it.qty,0) : 0;
  const discount = takeout ? 1000 * eligibleCount : 0;
  const total = Math.max(0, subtotal - discount);

  const dec = (i) => setCart(cart.map((it,idx) => idx===i ? {...it, qty: Math.max(1, it.qty-1)} : it));
  const inc = (i) => setCart(cart.map((it,idx) => idx===i ? {...it, qty: it.qty+1} : it));
  const rm  = (i) => setCart(cart.filter((_,idx)=>idx!==i));

  return (
    <aside className="soft-card p-5 lg:sticky lg:top-4 h-fit">
      <div className="flex items-center justify-between mb-3">
        <div>
          <div className="font-display tracking-[0.25em] text-xs text-gold uppercase">Your Order</div>
          <div className="font-display text-2xl">주문 내역</div>
        </div>
        <div className="chip chip-strong">{cart.reduce((s,i)=>s+i.qty,0)} 잔</div>
      </div>

      <div className="space-y-3 max-h-[50vh] overflow-y-auto pr-1 scroll-hide">
        {cart.length === 0 && <div className="text-sm ink-soft text-center py-8">담긴 메뉴가 없습니다.<br/>원하는 원두를 탭해 주세요.</div>}
        {cart.map((it, i) => {
          const unit = it.basePrice + (it.options.iced?500:0);
          return (
            <div key={i} className="pb-3 border-b hairline">
              <div className="flex justify-between items-start gap-2">
                <div className="flex-1">
                  <div className="font-medium text-sm">{it.name}</div>
                  <div className="text-[11px] ink-soft">{optionLabel(it.options) || '옵션 없음'}</div>
                </div>
                <button onClick={()=>rm(i)} className="text-xs ink-soft">✕</button>
              </div>
              <div className="flex justify-between items-center mt-2">
                <div className="flex items-center gap-2">
                  <button onClick={()=>dec(i)} className="w-7 h-7 rounded-full border hairline">−</button>
                  <span className="w-6 text-center text-sm">{it.qty}</span>
                  <button onClick={()=>inc(i)} className="w-7 h-7 rounded-full border hairline">+</button>
                </div>
                <div className="font-display text-lg">{KRW(unit * it.qty)}</div>
              </div>
            </div>
          );
        })}
      </div>

      <div className="mt-4">
        <label className="flex items-center gap-2 text-sm">
          <input type="checkbox" checked={takeout} onChange={e=>setTakeout(e.target.checked)} />
          테이크 아웃 (음료당 1,000원 할인 · 디저트/리필 제외)
        </label>
      </div>

      <div className="mt-4 space-y-1 text-sm">
        <div className="flex justify-between"><span className="ink-soft">소계</span><span>{KRW(subtotal)}</span></div>
        {takeout && <div className="flex justify-between text-gold"><span>테이크아웃 할인</span><span>- {KRW(discount)}</span></div>}
      </div>
      <div className="mt-2 flex justify-between items-baseline">
        <span className="font-display text-sm ink-soft">TOTAL</span>
        <span className="font-display text-3xl">{KRW(total)}</span>
      </div>
      <button disabled={cart.length===0} onClick={onCheckout} className={`btn w-full justify-center mt-4 ${cart.length? 'btn-primary':'btn-outline opacity-60 cursor-not-allowed'}`}>주문 접수하기</button>

}

function AdminView({ state, setState }) {
  const [authed, setAuthed] = useState(false);
  const [pw, setPw] = useState('');

  if (!authed) {
    return (
      <div className="max-w-md mx-auto mt-10 soft-card p-8 text-center">
        <div className="font-display tracking-[0.25em] text-xs text-gold uppercase">Admin</div>
        <div className="font-display text-2xl mt-1">관리자 로그인</div>
        <p className="text-xs ink-soft mt-2">기본 비밀번호: <span className="font-mono">stair</span> (배포 시 변경하세요)</p>
        <input type="password" value={pw} onChange={e=>setPw(e.target.value)}
               onKeyDown={e => e.key==='Enter' && (pw==='stair' ? setAuthed(true) : alert('비밀번호 오류'))}
               className="mt-4 w-full border hairline rounded-md px-3 py-2 bg-paper" placeholder="비밀번호" />
        <button onClick={()=> pw==='stair' ? setAuthed(true) : alert('비밀번호 오류')} className="btn btn-primary w-full justify-center mt-3">로그인</button>
      </div>
    );
  }

  const updateNote = (id, text) => setState({ ...state, notes: { ...state.notes, [id]: text } });
  const updateGreeting = (text) => setState({ ...state, greeting: text });

  const resetAll = () => {
    if (!confirm('사장님 한마디를 초기값으로 되돌립니다. 계속할까요?')) return;
    setState({ ...state, notes: { ...defaultOwnerNotes }, greeting: defaultGreeting });
  };

  const exportJson = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'stair_admin_export.json'; a.click();
    URL.revokeObjectURL(url);
  };

  const importJson = (ev) => {
    const f = ev.target.files?.[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const p = JSON.parse(r.result);
        setState({ ...state, ...p, notes: { ...defaultOwnerNotes, ...(p.notes||{}) } });
        alert('가져오기 완료');
      } catch(e) { alert('JSON 파싱 실패'); }
    };
    r.readAsText(f);
  };

  return (
    <div className="space-y-8">
      <div className="soft-card p-6">
        <div className="font-display tracking-[0.25em] text-xs text-gold uppercase">Greeting</div>
        <div className="font-display text-2xl mt-1 mb-2">사장님의 한마디 (메인 페이지)</div>
        <textarea value={state.greeting} onChange={e=>updateGreeting(e.target.value)}
          className="w-full border hairline rounded-md p-3 bg-paper text-sm leading-relaxed" rows={4}/>
      </div>

      <div className="soft-card p-6">
        <div className="flex justify-between items-center flex-wrap gap-3 mb-4">
          <div>
            <div className="font-display tracking-[0.25em] text-xs text-gold uppercase">Per-Item Notes</div>
            <div className="font-display text-2xl">원두별 사장님 한마디</div>
          </div>
          <div className="flex gap-2">
            <button onClick={exportJson} className="btn btn-outline">내보내기 (JSON)</button>
            <label className="btn btn-outline cursor-pointer">가져오기
              <input type="file" accept="application/json" className="hidden" onChange={importJson}/>
            </label>
            <button onClick={resetAll} className="btn btn-outline">초기화</button>
          </div>
        </div>

        <div className="space-y-3">
          {[...CATALOG.brewing, ...CATALOG.decaf, ...CATALOG.blended].map(b => (
            <div key={b.id} className="border hairline rounded-md p-3 bg-paper">
              <div className="flex justify-between items-start gap-3 flex-wrap">
                <div className="flex-1 min-w-[200px]">
                  <div className="font-medium">{b.name}</div>
                  <div className="text-xs ink-soft">{b.origin} · {b.process}</div>
                </div>
                <div className="text-xs ink-soft">{KRW(b.price)}</div>
              </div>
              <textarea value={state.notes[b.id] || ''} onChange={e=>updateNote(b.id, e.target.value)}
                className="w-full mt-2 border hairline rounded-md p-2 bg-paper-2 text-sm" rows={2}
                placeholder="사장님 한마디를 입력하세요" />
            </div>
          ))}
        </div>
      </div>

      <div className="soft-card p-6">
        <div className="font-display tracking-[0.25em] text-xs text-gold uppercase">Orders</div>
        <div className="font-display text-2xl mb-3">최근 주문 (로컬 기록)</div>
        {state.orders.length === 0 && <div className="text-sm ink-soft">아직 주문이 없습니다.</div>}
        <div className="space-y-3">
          {state.orders.slice().reverse().slice(0,30).map((o,i)=>(
            <div key={i} className="border hairline rounded-md p-3 text-sm bg-paper">
              <div className="flex justify-between">
                <div className="ink-soft text-xs">{new Date(o.at).toLocaleString('ko-KR')}</div>
                <div className="font-display text-lg">{KRW(o.total)}</div>
              </div>
              <ul className="mt-2 text-sm list-disc pl-5">
                {o.items.map((it,j)=><li key={j}>{it.name} × {it.qty} <span className="ink-soft text-xs">{optionLabel(it.options)}</span></li>)}
              </ul>
              {o.takeout && <div className="text-xs text-gold mt-1">테이크아웃</div>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('menu');
  const [state, setState] = useState(loadState);
  const [activeBean, setActiveBean] = useState(null);
  const [cart, setCart] = useState([]);
  const [takeout, setTakeout] = useState(false);
  const [toast, setToast] = useState(null);

  useEffect(() => { saveState(state); }, [state]);

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(null), 1600); };

  const addToCart = (entry) => {
    const opts = { ...DEFAULT_OPTIONS, ...entry.options };
    const idx = cart.findIndex(c => c.id === entry.id && sameOptions(c.options, opts));
    if (idx >= 0) {
      const next = [...cart]; next[idx] = { ...next[idx], qty: next[idx].qty + 1 }; setCart(next);
    } else {
      setCart([...cart, { ...entry, options: opts, qty: 1 }]);
    }
    setActiveBean(null);
    showToast(`담김: ${entry.name}`);
  };

  const checkout = () => {
    const subtotal = cart.reduce((s, it) => s + (it.basePrice + (it.options.iced?500:0)) * it.qty, 0);
    const eligible = cart.filter(it => !/리필|디저트|치즈케이크|토스트|주스/.test(it.name)).reduce((s,it)=>s+it.qty,0);
    const discount = takeout ? 1000 * eligible : 0;
    const total = Math.max(0, subtotal - discount);
    const order = { at: Date.now(), items: cart, total, takeout };
    setState({ ...state, orders: [...state.orders, order] });
    setCart([]); setTakeout(false);
    alert(`주문이 접수되었습니다.\n총 금액: ${KRW(total)}\n카운터에서 호출까지 잠시만 기다려 주세요 :)`);
  };

  return (
    <div className="min-h-screen">
      <header className="sticky top-0 z-30 bg-paper/90 backdrop-blur border-b hairline">
        <div className="max-w-[1400px] mx-auto px-5 md:px-8 py-4 flex items-center justify-between gap-4 flex-wrap">
          <div className="flex items-center gap-4">
            <div>
              <div className="font-stair text-2xl">STAiR</div>
              <div className="text-[10px] tracking-[0.3em] text-gold">스테어 커피 · SIPHON CAFE</div>
            </div>
          </div>
          <nav className="flex gap-2 flex-wrap">
            {[
              ['menu','메뉴 · 주문'],
              ['guide','사용 안내'],
              ['admin','관리자'],
            ].map(([k,label]) => (
              <button key={k} onClick={()=>setTab(k)} className={`btn ${tab===k?'btn-primary':'btn-outline'}`}>{label}</button>
            ))}
          </nav>
        </div>
      </header>

      <main className="max-w-[1400px] mx-auto px-5 md:px-8 py-6 md:py-10">
        {tab === 'menu' && (
          <div className="grid lg:grid-cols-[1fr_360px] gap-8">
            <div>
              <MenuView
                notes={state.notes}
                greeting={state.greeting}
                onAdd={addToCart}
                setActiveBean={setActiveBean}
              />
            </div>
            <CartPanel cart={cart} setCart={setCart} takeout={takeout} setTakeout={setTakeout} onCheckout={checkout} />
          </div>
        )}
        {tab === 'guide' && <GuideView />}
        {tab === 'admin' && <AdminView state={state} setState={setState} />}
      </main>

      {activeBean && <BeanModal bean={activeBean} ownerNote={state.notes[activeBean.id]} onClose={()=>setActiveBean(null)} onAdd={addToCart} />}

      {toast && (
        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 btn-primary btn shadow-lg">
          {toast}
        </div>
      )}

      <footer className="text-center text-xs ink-soft py-10">
        STAiR 스테어 커피 · @stair_2025 · 사이폰 전문 · 이 대시보드는 현장에서 실행되는 단일 파일 앱입니다.
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
